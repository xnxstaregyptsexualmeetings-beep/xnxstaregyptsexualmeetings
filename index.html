<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل البيانات</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>تسجيل البيانات الشخصية</h2>
    <form id="form1">
      <label>السكن:</label>
      <input type="text" id="sakan" required>

      <label>العمر:</label>
      <input type="number" id="age" required>

      <label>الطول بالسم:</label>
      <input type="number" id="height" required>

      <label>لون البشرة:</label>
      <select id="skin" required>
        <option value="">اختر</option>
        <option>فاتح</option>
        <option>قمحي</option>
        <option>أسمر</option>
        <option>داكن</option>
      </select>

      <label>هل تستطيع السفر؟</label>
      <div class="radio-group">
        <input type="radio" name="travel" value="نعم" required> نعم
        <input type="radio" name="travel" value="لا"> لا
      </div>

      <label>هل انت متزوج؟</label>
      <div class="radio-group">
        <input type="radio" name="married" value="نعم" required> نعم
        <input type="radio" name="married" value="لا"> لا
      </div>

      <label>رقم التلفون للتواصل:</label>
      <input type="tel" id="phone" placeholder="01xxxxxxxxx" required>

      <button type="submit">موافق</button>
    </form>
  </div>

  <!-- الفوتر حقوق النشر -->
  <footer class="footer">
    <p>© 2026 جميع الحقوق محفوظة - منصة الخدمات المصرية</p>
    <p>للتواصل والدعم الفني فقط | الموقع غير مسؤول عن أي استخدام خاطئ</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
