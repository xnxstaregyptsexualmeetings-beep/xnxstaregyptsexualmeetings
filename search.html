<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مواصفات البحث</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>حدد مواصفات طلبك</h2>
    <form id="form2">
      <label>العمر المطلوب:</label>
      <input type="number" id="age_req" required>

      <label>الطول المطلوب بالسم:</label>
      <input type="number" id="height_req" required>

      <label>الوزن المطلوب بالكجم:</label>
      <input type="number" id="weight_req" required>

      <label>لون البشرة المطلوب:</label>
      <select id="skin_req" required>
        <option value="">اختر</option>
        <option>فاتح</option>
        <option>قمحي</option>
        <option>أسمر</option>
        <option>داكن</option>
      </select>

      <label>مكان الطلب:</label>
      <select id="location" required>
        <option value="">اختر المحافظة/المدينة</option>
        <option>القاهرة</option>
        <option>الجيزة</option>
        <option>الإسكندرية</option>
        <option>المنصورة</option>
        <option>الزقازيق</option>
        <option>طنطا</option>
        <option>أسيوط</option>
        <option>سوهاج</option>
        <option>قنا</option>
        <option>الأقصر</option>
        <option>أسوان</option>
        <option>الفيوم</option>
        <option>بني سويف</option>
        <option>المنيا</option>
        <option>الإسماعيلية</option>
        <option>بورسعيد</option>
        <option>السويس</option>
        <option>دمياط</option>
        <option>كفر الشيخ</option>
        <option>الغربية</option>
      </select>

      <button type="submit">موافق</button>
    </form>
  </div>

  <!-- الفوتر حقوق النشر -->
  <footer class="footer">
    <p>© 2026 جميع الحقوق محفوظة - منصة الخدمات المصرية</p>
    <p>للتواصل والدعم الفني فقط | الموقع غير مسؤول عن أي استخدام خاطئ</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
