<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل البيانات - رجل</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="warning-banner">🔞 يجب أن يكون عمرك 19 سنة على الأقل - السرية التامة مطلوبة</div>
        <h2>📝 بياناتك الشخصية</h2>
        
        <form id="manForm">
            <label>الاسم الثلاثي:</label>
            <input type="text" id="fullname" required>

            <label>العمر:</label>
            <input type="number" id="age" min="19" max="100" required>

            <label>الطول (سم):</label>
            <input type="number" id="height" required>

            <label>لون البشرة:</label>
            <select id="skin" required>
                <option value="">اختر</option>
                <option>فاتح جدًا</option><option>فاتح</option><option>قمحي</option>
                <option>أسمر</option><option>داكن</option>
            </select>

            <label>الحالة الاجتماعية:</label>
            <select id="maritalStatus" required>
                <option value="">اختر</option>
                <option>أعزب</option><option>متزوج</option><option>مطلق</option>
            </select>

            <label>رقم الهاتف (واتساب):</label>
            <input type="tel" id="phone" placeholder="01xxxxxxxxx" required>

            <label>محافظة السكن:</label>
            <select id="city" required>
                <option>الخرطوم</option><option>أم درمان</option><option>بحري</option>
                <option>القاهرة</option><option>الإسكندرية</option><option>الجيزة</option>
         <option>مدني </option>
         <option>الحصاحيصا</option>
         <option>المناقل</option>
         <option>سنار</option>
         <option>القضارف</option>
         <option>رفاعة</option>
         <option>عطبرة+شندي</option>
         <option>الابيض </option>
         <option>الفاو</option>
         <option>الشمالية</option>
         <option>البورت</option>
         <option>كسلا</option>
            </select>

            <h3 style="margin-top:30px;">👩 مواصفات المرأة التي تبحث عنها</h3>
            
            <label>العمر المطلوب:</label>
            <input type="number" id="targetAge" required>

            <label>الطول المطلوب (سم):</label>
            <input type="number" id="targetHeight" required>

            <label>لون البشرة المطلوب:</label>
            <select id="targetSkin" required>
                <option>فاتح</option><option>قمحي</option><option>أسمر</option><option>داكن</option>
            </select>

            <label>الحالة الاجتماعية المطلوبة:</label>
            <select id="targetMaritalStatus" required>
                <option>عزباء</option><option>مطلقة</option><option>أرملة</option>
            </select>

            <label>شروط إضافية (اختياري):</label>
            <textarea id="extraConditions" rows="3" placeholder="مثال: غير مدخنة، متعلمة... (اتركها فارغة إذا لا توجد شروط)"></textarea>
            <button type="button" onclick="skipConditions()">تخطي الشروط الإضافية ➡️</button>

            <h3 style="margin-top:30px;">📋 أسئلة هامة</h3>
            
            <label>هل أنت جاهز للارتباط الجاد؟</label>
            <div class="radio-group">
                <label><input type="radio" name="ready" value="نعم" required> نعم</label>
                <label><input type="radio" name="ready" value="لا"> لا</label>
                <label><input type="radio" name="ready" value="غير متأكد"> غير متأكد</label>
            </div>

            <label>هل تحافظ على السرية التامة؟</label>
            <div class="radio-group">
                <label><input type="radio" name="privacy" value="نعم" required> نعم</label>
                <label><input type="radio" name="privacy" value="لا"> لا</label>
            </div>

            <label>هل هذه أول مقابلة لك من هذا النوع؟</label>
            <div class="radio-group">
                <label><input type="radio" name="firstTime" value="نعم" required> نعم</label>
                <label><input type="radio" name="firstTime" value="لا"> لا</label>
            </div>

            <label>هل تستطيع السفر والمبيت خارج مدينتك؟</label>
            <div class="radio-group">
                <label><input typez="radio" name="travel" value="نعم" required> نعم</label>
                <label><input type="radio" name="travel" value="لا"> لا</label>
            </div>

            <button type="submit">متابعة إلى الدفع 💰</button>
        </form>
    </div>
    <footer class="footer"><p>© 2026 - جميع الحقوق محفوظة | سرية تامة</p></footer>
    <script src="script.js"></script>
    <script>
        function skipConditions() {
            document.getElementById('extraConditions').value = "لا توجد شروط إضافية";
            alert("✅ تم تخطي الشروط الإضافية");
        }

        document.getElementById('manForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let manData = {
                name: document.getElementById('fullname').value,
                age: document.getElementById('age').value,
                height: document.getElementById('height').value,
                skin: document.getElementById('skin').value,
                marital: document.getElementById('maritalStatus').value,
                phone: document.getElementById('phone').value,
                city: document.getElementById('city').value,
                targetAge: document.getElementById('targetAge').value,
                targetHeight: document.getElementById('targetHeight').value,
                targetSkin: document.getElementById('targetSkin').value,
                targetMarital: document.getElementById('targetMaritalStatus').value,
                conditions: document.getElementById('extraConditions').value,
                ready: document.querySelector('input[name="ready"]:checked').value,
                privacy: document.querySelector('input[name="privacy"]:checked').value,
                firstTime: document.querySelector('input[name="firstTime"]:checked').value,
                travel: document.querySelector('input[name="travel"]:checked').value
            };
            localStorage.setItem('manData', JSON.stringify(manData));
            window.location.href = 'payment.html';
        });
    </script>
</body>
</html>
